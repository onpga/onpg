name: Update Sitemap for GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'public/sitemap.xml'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Copy sitemap to docs
        run: |
          mkdir -p docs
          if [ -f "public/sitemap.xml" ]; then
            cp public/sitemap.xml docs/sitemap.xml
          else
            echo "public/sitemap.xml not found, checking submodule..."
            git submodule update --init --recursive
            cp public/sitemap.xml docs/sitemap.xml
          fi
          touch docs/.nojekyll

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/sitemap.xml docs/.nojekyll
          git diff --staged --quiet || git commit -m "Auto-update sitemap.xml for GitHub Pages"
          git push

